<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameras</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <aside class="sidebar">
        <h2>SECURE CCTV</h2>
        <p class="sidebar-subtitle">MONITORING</p>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a class="active" href="cameras.html">Cameras</a></li>

            <li class="admin-only">
                <a href="logs.html">Logs</a>
            </li>

            <li class="admin-only">
                <a href="admin.html">Users</a>
            </li>

            <li><a href="settings.html">Settings</a></li>

            <li>
                <button id="logoutBtn" class="logout-btn">
                    Logout
                </button>
            </li>
        </ul>
    </aside>

    <main class="main-content">

        <div class="page-header">
            <h1>Cameras</h1>
            <p>Monitor your connected CCTV camera</p>
        </div>

        <section class="camera-section">

            <div class="camera-header">
                <h2>Main CCTV Camera</h2>

                <div class="camera-badges">
                    <span class="camera-name">
                        Main CCTV Camera
                    </span>

                    <span class="live-badge" id="cameraPageBadge">
                        ● CHECKING
                    </span>
                </div>
            </div>

            <div class="camera-feed-container">

                <div class="camera-unavailable-box" id="cameraPageMessage">
                    Checking camera availability...
                </div>

                <img
                    id="cameraPageFeed"
                    alt="Live CCTV Feed"
                    style="display: none;"
                >

            </div>

        </section>

    </main>

</div>

<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {
    const cameraMessage = document.getElementById("cameraPageMessage");
    const cameraFeed = document.getElementById("cameraPageFeed");
    const cameraBadge = document.getElementById("cameraPageBadge");

    try {
        const response = await fetch("/api/camera/status", {
            method: "GET",
            credentials: "include"
        });

        if (!response.ok) {
            cameraMessage.textContent =
                "Camera unavailable in cloud deployment";

            cameraBadge.textContent =
                "● UNAVAILABLE";

            return;
        }

        const data = await response.json();

        cameraBadge.textContent = "● " + data.status;

        if (data.status === "ONLINE") {
            cameraMessage.style.display = "none";

            cameraFeed.style.display = "block";
            cameraFeed.src = "/api/camera/stream";
        } else {
            cameraMessage.textContent =
                "Camera unavailable in cloud deployment";
        }

    } catch (error) {
        console.error("Camera error:", error);

        cameraMessage.textContent =
            "Camera unavailable in cloud deployment";

        cameraBadge.textContent =
            "● UNAVAILABLE";
    }
});
</script>

</body>
</html>
