<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CCTV MONITORING Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>CCTV MONITORING System</h1>

        <form id="loginForm">

            <div class="input-group">

                <label for="username">
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                >
               
            </div>

            <div class="input-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >

            </div>
            
        <p>Please log in to continue</p>     
            <button type="submit">
                Login
            </button>

        </form>

        <div id="message"></div>

    </div>

</div>

<script src="js/login.js?v=2"></script>

</body>
</html>
